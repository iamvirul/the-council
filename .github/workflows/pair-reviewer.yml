name: PairReviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

  pull_request_review:
    types: [submitted]

  issue_comment:
    types: [created]

  workflow_dispatch:

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      models: read

    steps:
      - uses: iamvirul/PairReviewer@v1
        with:
          reviewer-token: ${{ secrets.REVIEWER_PAT }}
          models-token: ${{ secrets.MODELS_PAT }}
